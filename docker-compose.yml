services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: locatifpro
      POSTGRES_USER: locatifpro
      POSTGRES_PASSWORD: locatifpro
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  directus:
    image: directus/directus:latest
    depends_on:
      - db
    environment:
      # Sécurité
      KEY: "locatifpro-key"
      SECRET: "locatifpro-secret-32-bytes-minimum----OK"

      # Base de données
      DB_CLIENT: "pg"
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: locatifpro
      DB_USER: locatifpro
      DB_PASSWORD: locatifpro
      ADMIN_EMAIL: "ebrunoir@groupecreo.com"
      ADMIN_PASSWORD: "Mopimop972"

      PUBLIC_URL: "https://${CODESPACE_NAME}-8055.${GITHUB_CODESPACES_PORT_FORWARDING_DOMAIN}"

      # Environnement
      NODE_ENV: "development"

    ports:
      - "8055:8055"

    volumes:
      - uploads:/directus/uploads

volumes:
  pgdata:
  uploads:
